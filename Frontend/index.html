<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Weather App</title>
    <link rel = "stylesheet" href="css/styles.css">
</head>
<body>
    <div class="card">
        <div class="search-bar">
            <input type="text" placeholder="Ingresa la ciudad..." spellcheck="false">
            <button><img src="../assets/images/search.png" alt=""></button>
        </div>
        <div class="error">
            <p>Nombre de ciudad inválido</p>
        </div>
        <div class="weather">
            <img src="../assets/images/rain.png" alt="" class="weather-icon">
            <h1 class="temp">23 </h1>
            <h2 class="city">Bogotá</h2>
            <div class="details">
                <div class="col">
                    <img src="../assets/images/humidity.png"">
                    <div>
                        <p class="humidity">50%</p>
                        <p>Humedad</p>
                    </div>
                </div>
                <div class="col">
                    <img src="../assets/images/wind.png" alt="">
                    <div>
                        <p class="wind">120km/h</p>
                        <p>Velocidad del viento</p>
                    </div>
                </div>
            </div>
        </div>
    </div>
    <script type="module" src="./weather.js"></script>
</body>
</html>
